name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: make lint
      - name: Format check
        run: ruff format --check src/ tests/
      - name: Test
        run: pytest tests/ --ignore=tests/test_api.py
  docker:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - name: Create dummy model
        run: mkdir -p models && touch models/best.pt
      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t wildfire-api .
